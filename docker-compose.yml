services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lunarpup
      POSTGRES_USER: lunarpup
      POSTGRES_PASSWORD: lunarpup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lunarpup -d lunarpup"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - timescaledb-data:/var/lib/postgresql/data

volumes:
  timescaledb-data:
